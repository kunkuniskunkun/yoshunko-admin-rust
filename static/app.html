<script>
// Auto-detect immediately after DOM ready, before big JS bundle
(function ad() {
  if (!window.pywebview || !window.pywebview.api) { setTimeout(ad, 200); return; }
  pywebview.api.auto_detect_paths().then(function(r) {
    if (r.candidates && r.candidates.length > 0) {
      var el = document.getElementById('setup-candidates');
      if (el) { el.innerHTML = '<p class=\"text-sm text-muted\" class=\"mb-1 mt-2\">检测到的路径（点击填入）：</p>' + r.candidates.map(function(p) { return '<div class=\"candidate-path\" data-action=\"candidate-path\" data-path=\"' + p.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '\">' + p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'; }).join(''); }
      var inp = document.getElementById('setup-state-dir');
      if (inp) inp.value = r.candidates[0];
    }
    pywebview.api.get_version().then(function(v) {
      var el = document.getElementById('setup-version');
      if (el) el.textContent = v.version;
    });
  }).catch(function(){});
})();
</script>

// --- static/js/utils.js ---
// ═══════════════════════════════════════════════════════
// DOM Utilities & Rendering Helpers
// ═══════════════════════════════════════════════════════

// Query helpers
var $ = function(s) { return document.querySelector(s); };
var $$ = function(s) { return document.querySelectorAll(s); };

// HTML escape
function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════════════
// Toast notification
// ═══════════════════════════════════════════════════════
function toast(msg, type) {
  if (!type) type = 'success';
  var container = $('#toast-container');
  var el = document.createElement('div');
  el.className = 'toast toast--' + type;
  el.setAttribute('role', 'alert');
  el.innerHTML = '<span class="toast-icon">' + (type === 'success' ? '✓' : (type === 'error' ? '✗' : 'ℹ')) + '</span><span class="toast__msg">' + escHtml(msg) + '</span><button class="toast__close" data-action="close-toast" aria-label="关闭">&times;</button>';
  container.appendChild(el);
  var timer = setTimeout(function() { removeToast(el); }, 3000);
  el._timer = timer;
}

function removeToast(el) {
  clearTimeout(el._timer);
  el.style.opacity = '0';
  el.style.transform = 'translateY(-20px)';
  el.style.transition = 'all 0.25s ease';
  setTimeout(function() { if (el.parentNode) el.remove(); }, 250);
}

// ═══════════════════════════════════════════════════════
// Custom Confirm Dialog
// ═══════════════════════════════════════════════════════
function showConfirm(msg, onConfirm) {
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay confirm-overlay';
  overlay._onConfirm = onConfirm;
  overlay.innerHTML = '<div class="confirm-dialog">' +
    '<p class="confirm-msg">' + escHtml(msg) + '</p>' +
    '<div class="confirm-actions">' +
    '<button class="btn btn-ghost" data-action="confirm-cancel">取消</button>' +
    '<button class="btn btn-danger" data-action="confirm-ok">确认</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
}

// ═══════════════════════════════════════════════════════
// Safe Save Wrapper
// ═══════════════════════════════════════════════════════
async function safeSave(label, fn) {
  try {
    // Disable save buttons during save
    var saveBtns = document.querySelectorAll('[data-action^="save-"]');
    saveBtns.forEach(function(b) { b.disabled = true; b.textContent = '保存中...'; });
    await fn();
    _dirty = false;
    toast(label + ' 已保存');
    return true;
  }
  catch(e) { toast(label + ' 失败: ' + escHtml(e.message || String(e)), 'error'); return false; }
  finally {
    var saveBtns = document.querySelectorAll('[data-action^="save-"]');
    saveBtns.forEach(function(b) { b.disabled = false; b.textContent = '保存更改'; });
  }
}

// ═══════════════════════════════════════════════════════
// Search handler factory (dedup)
// ═══════════════════════════════════════════════════════
function createSearchHandler(stateKey, viewKey, renderFn, selectedKey) {
  var timer = 0;
  return function(val) {
    state[stateKey] = val;
    state[viewKey] = 'gallery';
    if (selectedKey) state[selectedKey] = null;
    clearTimeout(timer);
    var activeEl = document.activeElement;
    var activeId = activeEl ? activeEl.id : null;
    timer = setTimeout(function() {
      renderFn();
      // Restore focus to search input after re-render
      if (activeId) {
        var restored = document.getElementById(activeId);
        if (restored) { restored.focus(); restored.setSelectionRange(restored.value.length, restored.value.length); }
      }
    }, 150);
  };
}

// ═══════════════════════════════════════════════════════
// Star / Sub-dot / Rank rendering
// ═══════════════════════════════════════════════════════
function renderStars(count, max) {
  var s = '<span class="star-rating">';
  for (var i = 0; i < max; i++) {
    s += '<span class="star ' + (i < count ? 'on' : 'off') + '">★</span>';
  }
  s += '</span>';
  return s;
}

function renderSubDots(count, max) {
  var s = '<span class="sub-dot-group">';
  for (var i = 0; i < max; i++) {
    s += '<span class="sub-dot ' + (i < count ? 'filled' : '') + '"></span>';
  }
  s += '</span>';
  return s;
}

function renderRankDots(rank) {
  var s = '<span class="rank-dots">';
  for (var i = 0; i < 6; i++) {
    s += '<span class="rank-dot ' + (i < rank ? 'filled' : '') + '"></span>';
  }
  s += '</span>';
  return s;
}

// ═══════════════════════════════════════════════════════
// Stepper Input HTML Generators
// ═══════════════════════════════════════════════════════
function stepperInput(id, value, min, max) {
  return '<div class="input-stepper">' +
    '<button type="button" data-action="step" data-selector="#' + id + '" data-delta="-1" data-min="' + min + '" data-max="' + max + '" aria-label="减少">−</button>' +
    '<input type="number" id="' + id + '" value="' + value + '" min="' + min + '" max="' + max + '" data-action="clamp-input" data-min="' + min + '" data-max="' + max + '">' +
    '<button type="button" data-action="step" data-selector="#' + id + '" data-delta="1" data-min="' + min + '" data-max="' + max + '" aria-label="增加">+</button>' +
    '</div>';
}

// ═══════════════════════════════════════════════════════
// Stepper Logic Functions
// ═══════════════════════════════════════════════════════

// Simple step by element ID (legacy, used directly in some places)
function stepInput(id, delta, min, max) {
  var el = document.getElementById(id);
  if (!el) return;
  var v = (parseInt(el.value) || 0) + delta;
  el.value = Math.max(min, Math.min(max, v));
}

// Clamp input value on change
function clampInput(id, min, max) {
  var el = document.getElementById(id);
  if (!el) return;
  var v = parseInt(el.value) || 0;
  if (v < min) el.value = min;
  if (v > max) el.value = max;
}

// Step value by ID (used by equip editor) — dispatches input event for live updates
function stepValue(id, delta) {
  var el = document.getElementById(id);
  if (!el) return;
  var v = parseInt(el.value) || 0;
  v = Math.max(parseInt(el.min) || 0, Math.min(parseInt(el.max) || 999, v + delta));
  el.value = v;
  el.dispatchEvent(new Event('input', {bubbles: true}));
}

// ═══════════════════════════════════════════════════════
// Unified Stepper by CSS Selector (Task 4.4)
// Replaces stepEqSubBase, stepEqSubAdd, stepNewEqSubBase, stepNewEqSubAdd
// Usage: stepBySelector('.eq-sub-add[data-idx="0"]', 1, 0, 4)
// ═══════════════════════════════════════════════════════
function stepBySelector(selector, delta, min, max) {
  var el = document.querySelector(selector);
  if (!el) return;
  var v = parseInt(el.value) || 0;
  v = Math.max(min, Math.min(max, v + delta));
  el.value = v;
  el.dispatchEvent(new Event('input', {bubbles: true}));
}

// Stepper keyboard support: up/down arrows on number inputs
document.addEventListener('keydown', function(e) {
  if (e.target.tagName !== 'INPUT' || e.target.type !== 'number') return;
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    stepBySelector('#' + e.target.id, 1, parseInt(e.target.min) || 0, parseInt(e.target.max) || 999);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    stepBySelector('#' + e.target.id, -1, parseInt(e.target.min) || 0, parseInt(e.target.max) || 999);
  }
});

// ═══════════════════════════════════════════════════════
// Build template lookup Maps (Task 4.6 — O(1) lookups)
// ═══════════════════════════════════════════════════════
function buildTemplateMaps() {
  if (!state.templates) return;
  state.avatarMap = new Map();
  if (state.templates.avatars) {
    state.templates.avatars.forEach(function(a) {
      state.avatarMap.set(a.id, a);
    });
  }
  state.weaponMap = new Map();
  if (state.templates.weapons) {
    state.templates.weapons.forEach(function(w) {
      state.weaponMap.set(w.id, w);
    });
  }
}

// ═══════════════════════════════════════════════════════
// Template lookup helpers (using Map for O(1) access)
// ═══════════════════════════════════════════════════════
function avatarName(id) {
  if (state.avatarMap) {
    var t = state.avatarMap.get(id);
    if (t) return '' + t.name;
  }
  // Fallback to array search
  var t = state.templates && state.templates.avatars ? state.templates.avatars.find(function(a) { return a.id === id; }) : null;
  return t ? '' + t.name : 'Avatar ' + id;
}

function weaponName(id) {
  if (state.weaponMap) {
    var t = state.weaponMap.get(id);
    if (t) return t.name;
  }
  // Fallback to array search
  var t = state.templates && state.templates.weapons ? state.templates.weapons.find(function(w) { return w.id === id; }) : null;
  return t ? t.name : 'Weapon ' + id;
}

var suitColors = ['wood', 'fire', 'ice', 'elec', 'phys', 'ether'];
function suitColorClass(suitType) {
  return suitColors[suitType % suitColors.length] || '';
}

async function renderAvatars() {
  // Use cache if available
  if (state._avatarCache && !state._cacheDirty) {
    var avatars = state._avatarCache;
  } else {
    var data = await API.getAvatars(state.uid);
    state._avatarCache = data.avatars;
    state._cacheDirty = false;
    var avatars = data.avatars;
  }

  // Filter out alt characters (2071, 2121)
  avatars = avatars.filter(function(av) { return av.avatar_id !== 2071 && av.avatar_id !== 2121; });

  // -- Search filter --
  var q = (state.avatarSearch || '').toLowerCase();
  if (q) {
    avatars = avatars.filter(function(av) {
      var t = state.avatarMap ? state.avatarMap.get(av.avatar_id) : null;
      if (!t && state.templates && state.templates.avatars) {
        t = state.templates.avatars.find(function(a) { return a.id === av.avatar_id; });
      }
      var campName = (t && t.camp_name ? t.camp_name : '').toLowerCase();
      var campIdStr = t ? String(t.camp_id || '') : '';
      var profName = (av.profession || '').toLowerCase();
      // Pinyin matching
      var py = (typeof AVATAR_PINYIN !== 'undefined' && AVATAR_PINYIN[av.avatar_id]) ? AVATAR_PINYIN[av.avatar_id] : null;
      var pinyinMatch = py && (py.full.includes(q) || py.initials.includes(q));
      return String(av.avatar_id).includes(q)
        || (av.name || '').toLowerCase().includes(q)
        || campName.includes(q)
        || campIdStr.includes(q)
        || profName.includes(q)
        || pinyinMatch;
    });
  }

  // -- Group by camp or profession --
  var groupBy = state.avatarGroupBy || 'camp';
  var groups = {};
  for (var i = 0; i < avatars.length; i++) {
    var av = avatars[i];
    var t = state.avatarMap ? state.avatarMap.get(av.avatar_id) : null;
    if (!t && state.templates && state.templates.avatars) {
      t = state.templates.avatars.find(function(a) { return a.id === av.avatar_id; });
    }
    var groupId, groupName;
    if (groupBy === 'profession') {
      groupId = av.profession || '未知';
      groupName = groupId;
    } else {
      groupId = (t && t.camp_id != null) ? t.camp_id : 0;
      groupName = (t && t.camp_name) ? t.camp_name : '营' + groupId;
    }
    if (!groups[groupId]) {
      groups[groupId] = { group_name: groupName, avatars: [] };
    }
    groups[groupId].avatars.push(av);
  }

  // Sort by avatar_id within each group
  Object.keys(groups).forEach(function(key) {
    groups[key].avatars.sort(function(a, b) { return a.avatar_id - b.avatar_id; });
  });

  // Sort groups
  var sortedGroups;
  if (groupBy === 'profession') {
    var profOrder = ['强攻', '击破', '异常', '支援', '防护', '命破'];
    sortedGroups = Object.keys(groups).sort(function(a, b) {
      var ia = profOrder.indexOf(a); if (ia < 0) ia = 999;
      var ib = profOrder.indexOf(b); if (ib < 0) ib = 999;
      return ia - ib;
    });
  } else {
    sortedGroups = Object.keys(groups).map(Number).sort(function(a, b) { return a - b; });
  }

  // ── Editor Mode ──
  if (state.avatarView === 'editor' && state.selectedAvatarId) {
    $('#main').innerHTML = await avatarEditorHTML(state.selectedAvatarId);
    return;
  }

  // ── Gallery Mode ──
  state.avatarView = 'gallery';

  var html = '<div class="page-header"><h2>角色仓库</h2><span class="subtitle">管理等级、影画、技能、潜能激发</span></div>';

  // Search bar with group toggle
  var groupLabel = groupBy === 'profession' ? '按职业' : '按阵营';
  html += '<div class="search-bar-row"><div class="search-wrap"><input type="text" id="avatar-search" placeholder="搜索角色 ID、名称、阵营或职业..." aria-label="搜索角色" value="' + escHtml(state.avatarSearch || '') + '" data-action="search-avatars"><span class="search-count" id="avatar-search-count"></span>' + (state.avatarSearch ? '<button class="search-clear" data-action="clear-avatar-search" aria-label="清除搜索">×</button>' : '') + '</div><button class="search-group-toggle" data-action="toggle-avatar-group" title="切换分组：' + groupLabel + '">' + groupLabel + '</button></div>';

  if (avatars.length === 0) {
    html += '<div class="empty-state"><div class="empty-state__icon"></div><p>没有找到匹配的角色</p></div>';
    $('#main').innerHTML = html;
  applyStaggeredAnimation('.avatar-gallery__card');
    return;
  }

  // Gallery grid grouped by camp or profession
  html += '<div class="avatar-gallery">';
  for (var ci = 0; ci < sortedGroups.length; ci++) {
    var groupId = sortedGroups[ci];
    var grp = groups[groupId];
    html += '<div class="avatar-gallery__camp-section">';
    html += '<div class="avatar-gallery__camp-header">' + escHtml(grp.group_name) + ' <span class="text-xs text-muted">(' + grp.avatars.length + ')</span></div>';
    html += '<div class="avatar-gallery__grid">';
    for (var ai = 0; ai < grp.avatars.length; ai++) {
      var av = grp.avatars[ai];
      var rarity = av.rarity || '?';
      var rarityCls = rarity === 'S' ? 'rarity-s' : 'rarity-a';
      var cardCls = rarity === 'S' ? 'avatar-gallery__card--s' : 'avatar-gallery__card--a';
      var favStarHtml = av.is_favorite ? '<div class="avatar-card__fav">★</div>' : '';
      var t2 = state.avatarMap ? state.avatarMap.get(av.avatar_id) : null;
      if (!t2 && state.templates && state.templates.avatars) {
        t2 = state.templates.avatars.find(function(a) { return a.id === av.avatar_id; });
      }
      var campName = (t2 && t2.camp_name) ? t2.camp_name : '';
      html += '<div class="game-card avatar-gallery__card ' + cardCls + '" tabindex="0" role="button" data-action="select-avatar" data-id="' + av.avatar_id + '">' +
        favStarHtml +
        '<div class="card-header">' +
          '<span><span class="game-card__rarity ' + rarityCls + '">' + rarity + '</span><span class="card-title">' + escHtml(av.name) + '</span></span>' +
          '<span class="game-card__level">Lv.' + av.level + '</span>' +
        '</div>' +
        '<div class="card-meta">' +
          '<span>' + renderRankDots(av.unlocked_talent_num || 0) + '</span>' +
          '<span class="text-sm text-accent ml-1\.5">' + (av.unlocked_talent_num || 0) + '影</span>' +
        '</div>' +
        '<div class="avatar-card__footer">' +
          '<span class="avatar-card__camp-tag">' + escHtml(campName) + '</span>' +
          (av.profession ? '<span class="avatar-card__camp-tag ml-1">' + escHtml(av.profession) + '</span>' : '') +
          '<span class="text-xs text-muted">ID:' + av.avatar_id + '</span>' +
        '</div>' +
      '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';

  $('#main').innerHTML = html;
  applyStaggeredAnimation('.avatar-gallery__card');
}

async function avatarEditorHTML(aid) {
  var av = await API.getAvatar(state.uid, aid);
  state.skillTypes[aid] = av.skill_type_level.map(function(s) { return s.type; });
  state.skillData[aid] = av.skill_type_level;

  var skillNames = ['普攻', '特殊技', '闪避', '连携技', '终结技', null, '支援技'];

  // Compute expected rank from level
  var level = av.level;
  var expectedRank = level === 0 ? 0 : Math.min(6, Math.max(1, Math.floor((level - 1) / 10) + 1));

  var h = '<div class="editor-page">';
  h += '<div class="editor-page__top">';
  h += '<span class="back-link" data-action="back-to-gallery">← 角色仓库</span>';
  h += '<div class="editor-page__header"><h2>' + escHtml(av.name) + '</h2>' + (av.en_name ? '<span class="sub en-name">' + escHtml(av.en_name) + '</span>' : '') + '<span class="sub">ID: ' + aid + '</span></div>';
  h += '</div>';
  h += '<div class="editor-page__body">';

  // Basic stats
  h += '<div class="section-title">基础属性</div>';
  h += '<div class="form-row">';
  h += '<div class="form-field"><label class="form-label">等级</label>' + stepperInput('av-level', av.level, 0, 60) + '</div>';
  h += '<div class="form-field"><label class="form-label">影画 (命座)</label>' + stepperInput('av-talent', av.unlocked_talent_num, 0, 6) + '</div>';
  h += '</div>';

  // Show auto-computed rank (read-only)
  h += '<div class="text-sm text-muted mt-2">等级 ' + level + ' → 自动突破等级 ' + expectedRank + ' (Lv上限 ' + (expectedRank * 10) + ')</div>';

  // Skills
  h += '<div class="section-title">技能等级</div>';
  h += '<div class="skill-grid">';
  for (var i = 0; i < Math.min(av.skill_type_level.length, 7); i++) {
    var sk = av.skill_type_level[i];
    if (sk.type === 'core_skill') continue;
    if (sk.type === 'unique_skill') continue; // 终结技与连携技重复，跳过
    var maxLv = 12;
    h += '<div class="skill-card">' +
      '<div class="skill-name">' + (skillNames[i] || sk.type) + '</div>' +
      '<input type="number" class="av-skill-lvl" data-idx="' + i + '" data-type="' + sk.type + '" value="' + sk.level + '" min="1" max="' + maxLv + '">' +
      '<div class="text-xs text-muted">max ' + maxLv + '</div>' +
    '</div>';
  }
  // 核心被动卡片（替代终结技位置）
  h += '<div class="skill-card">' +
    '<div class="skill-name">核心被动</div>' +
    '<input type="number" id="av-passive" value="' + av.passive_skill_level + '" min="0" max="7">' +
    '<div class="text-xs text-muted">max 7</div>' +
  '</div>';
  h += '</div>';

  // Potential Awakening (潜能激发)
  h += '<div class="section-title">潜能激发</div>';
  h += '<div class="form-row">';
  h += '<div class="form-field"><label class="form-label">潜能激发</label>' + stepperInput('av-awake', av.awake_id, 0, 999999) + '</div>';
  h += '<div class="form-field"><label class="form-label">当前武器 UID</label><input class="form-input form-input--short" type="number" id="av-weapon" value="' + av.cur_weapon_uid + '" min="0"></div>';
  h += '</div>';

  h += '</div>';
  h += '<button class="btn btn-primary editor-fab" data-action="save-avatar" data-id="' + aid + '">保存更改</button>';
  h += '</div>';

  return h;
}

async function saveAvatar(aid) {
  await safeSave('角色数据', async function() {
    var skillLevels = [];
    $$('.av-skill-lvl').forEach(function(inp) {
      skillLevels.push({ type: inp.dataset.type, level: parseInt(inp.value) });
    });
    // Re-insert unique_skill from original data (not editable in form)
    var origSkills = state.skillData[aid];
    if (origSkills) {
      var types = state.skillTypes[aid] || [];
      var uniqueIdx = types.indexOf('unique_skill');
      if (uniqueIdx >= 0 && !skillLevels.find(function(s) { return s.type === 'unique_skill'; })) {
        var origData = origSkills.find(function(s) { return s.type === 'unique_skill'; });
        if (origData) skillLevels.splice(uniqueIdx, 0, { type: 'unique_skill', level: origData.level });
      }
    }
    // Insert core_skill from the editor input
    var coreIdx = state.skillTypes[aid] ? state.skillTypes[aid].indexOf('core_skill') : 5;
    var coreLevel = parseInt($('#av-passive').value) || 0;
    skillLevels.splice(coreIdx >= 0 ? coreIdx : 5, 0, { type: 'core_skill', level: coreLevel });

    var body = {
      level: parseInt($('#av-level').value),
      passive_skill_level: parseInt($('#av-passive').value),
      unlocked_talent_num: parseInt($('#av-talent').value),
      skill_type_level: skillLevels,
      awake_id: parseInt($('#av-awake').value),
      cur_weapon_uid: parseInt($('#av-weapon').value) || 0
    };
    var result = await API.updateAvatar(state.uid, aid, body);
    if (result && result.ok === false) throw new Error(result.error || '保存失败');
    markCacheDirty();
    state.avatarView = 'gallery';
    state.selectedAvatarId = null;
    renderAvatars();
  });
}

async function renderWeapons() {
  // Use cache if available
  if (state._weaponCache && !state._cacheDirty) {
    var weapons = state._weaponCache;
  } else {
    var data = await API.getWeapons(state.uid);
    state._weaponCache = data.weapons;
    state._cacheDirty = false;
    var weapons = data.weapons;
  }

  weapons.sort(function(a, b) { return b.uid - a.uid; });

  // Filter out B-rank weapons (12000-12999)
  weapons = weapons.filter(function(w) { return w.id < 12000 || w.id > 12999; });

  // Search filter
  var q = (state.weaponSearch || '').toLowerCase();
  if (q) {
    weapons = weapons.filter(function(w) {
      // Pinyin matching
      var py = (typeof WEAPON_PINYIN !== 'undefined' && WEAPON_PINYIN[w.id]) ? WEAPON_PINYIN[w.id] : null;
      var pinyinMatch = py && (py.full.includes(q) || py.initials.includes(q));
      var profName = (w.profession || '').toLowerCase();
      return String(w.id).includes(q) || String(w.uid).includes(q)
        || (w.name || '').toLowerCase().includes(q)
        || profName.includes(q)
        || pinyinMatch;
    });
  }

  // ── Editor View ──
  if (state.weaponView === 'editor' && state.selectedWeaponUid) {
    $('#main').innerHTML = await weaponEditorHTML(state.selectedWeaponUid);
    return;
  }

  // ── Gallery View ──
  state.weaponView = 'gallery';

  // Group by profession (from weapon data directly)
  var groups = {};
  var profOrder = ['强攻', '击破', '异常', '支援', '防护', '命破'];
  var ungroupedIdx = 0;
  for (var i = 0; i < weapons.length; i++) {
    var w = weapons[i];
    var prof = w.profession || '';
    if (!prof) {
      prof = '_其他_' + (ungroupedIdx++);
      if (!groups[prof]) groups[prof] = { label: '未知职业', weapons: [] };
    } else {
      if (!groups[prof]) groups[prof] = { label: prof, weapons: [] };
    }
    groups[prof].weapons.push(w);
  }

  var html = '<div class="page-header"><h2>音擎仓库</h2><span class="subtitle">管理音擎等级、星级突破与精炼等级</span></div>';

  // Search bar
  html += '<div class="search-wrap"><input type="text" id="weapon-search" placeholder="搜索音擎 ID、名称、职业..." aria-label="搜索音擎" value="' + escHtml(state.weaponSearch || '') + '" data-action="search-weapons"><span class="search-count" id="weapon-search-count"></span>' + (state.weaponSearch ? '<button class="search-clear" data-action="clear-weapon-search" aria-label="清除搜索">×</button>' : '') + '</div>';

  if (weapons.length === 0) {
    html += '<div class="empty-state"><div class="empty-state__icon"></div><p>没有找到匹配的音擎</p></div>';
    $('#main').innerHTML = html;
  applyStaggeredAnimation('.avatar-gallery__card');
    return;
  }

  html += '<div class="avatar-gallery">';
  for (var gi = 0; gi < profOrder.length; gi++) {
    var prof = profOrder[gi];
    var group = groups[prof];
    if (!group) continue;
    html += '<div class="avatar-gallery__camp-section">';
    html += '<div class="avatar-gallery__camp-header">' + group.label + ' <span class="text-xs text-muted">(' + group.weapons.length + ')</span></div>';
    html += '<div class="avatar-gallery__grid">';
    for (var wi = 0; wi < group.weapons.length; wi++) {
      var w = group.weapons[wi];
      var tier;
      if (w.id >= 14000) tier = 'S';
      else if (w.id >= 13000) tier = 'A';
      else tier = 'B';
      var rarityCls = tier === 'S' ? 'rarity-s' : (tier === 'A' ? 'rarity-a' : '');
      var cardCls = tier === 'S' ? 'avatar-gallery__card--s' : (tier === 'A' ? 'avatar-gallery__card--a' : '');
      var maxRefine = w.max_refine || 5;
      html += '<div class="game-card avatar-gallery__card ' + cardCls + '" tabindex="0" role="button" data-action="select-weapon" data-id="' + w.uid + '">' +
        '<div class="card-header">' +
          '<span>' + (rarityCls ? '<span class="game-card__rarity ' + rarityCls + '">' + tier + '</span>' : '') + '<span class="card-title">' + escHtml(w.name) + '</span></span>' +
          '<span class="game-card__level">Lv.' + w.level + '</span>' +
        '</div>' +
        '<div class="card-meta">' +
          '<span>' + renderStars(w.refine_level, maxRefine) + '</span>' +
          '<span class="refine-pill">R' + w.refine_level + '</span>' +
        '</div>' +
        '<div class="avatar-card__footer">' +
          '<span class="avatar-card__camp-tag">' + escHtml(group.label) + '</span>' +
          '<span class="text-xs text-muted">#' + w.uid + '</span>' +
        '</div>' +
      '</div>';
    }
    html += '</div></div>';
  }
  // Handle unknown profession groups
  for (var key in groups) {
    if (profOrder.indexOf(key) >= 0) continue;
    var group = groups[key];
    html += '<div class="avatar-gallery__camp-section">';
    html += '<div class="avatar-gallery__camp-header">' + group.label + ' <span class="text-xs text-muted">(' + group.weapons.length + ')</span></div>';
    html += '<div class="avatar-gallery__grid">';
    for (var wi = 0; wi < group.weapons.length; wi++) {
      var w = group.weapons[wi];
      var maxRef = w.max_refine || 5;
      html += '<div class="game-card avatar-gallery__card" tabindex="0" role="button" data-action="select-weapon" data-id="' + w.uid + '">' +
        '<div class="card-header"><span class="card-title">' + escHtml(w.name) + '</span><span class="game-card__level">Lv.' + w.level + '</span></div>' +
        '<div class="card-meta"><span>' + renderStars(w.refine_level, maxRef) + '</span></div>' +
        '<div class="avatar-card__footer"><span class="text-xs text-muted">#' + w.uid + '</span></div>' +
      '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';

  $('#main').innerHTML = html;
  applyStaggeredAnimation('.avatar-gallery__card');
}

// Equips Panel — 驱动盘仓库

async function renderEquips() {
  // Use cache if available
  if (state._equipCache && !state._cacheDirty) {
    var equips = state._equipCache;
  } else {
    var data = await API.getEquips(state.uid);
    state._equipCache = data.equips;
    state._cacheDirty = false;
    var equips = data.equips;
  }

  equips.sort(function(a, b) { return b.uid - a.uid; });

  // Search filter
  var q = (state.equipSearch || '').toLowerCase();
  if (q) {
    equips = equips.filter(function(eq) {
      // Pinyin matching for suit name
      var py = (typeof SUIT_PINYIN !== 'undefined') ? SUIT_PINYIN[String(eq.suit_type || '')] : null;
      var pinyinMatch = py && (py.full.includes(q) || py.initials.includes(q));
      return String(eq.uid).includes(q)
        || (eq.suit_name || '').toLowerCase().includes(q)
        || (eq.slot_name || '').toLowerCase().includes(q)
        || String(eq.id).includes(q)
        || pinyinMatch;
    });
  }

  // ── Editor View ──
  if (state.equipView === 'editor' && state.selectedEquipUid) {
    $('#main').innerHTML = await equipEditorHTML(state.selectedEquipUid);
    initEquipEditorDOM();
    return;
  }

  // ── Gallery View ──
  var html = '<div class="equip-gallery">';
  html += '<div class="page-header flex-between"><div><h2>驱动盘仓库</h2><span class="subtitle">管理驱动盘数据，包括主属性与副属性</span></div>';
  html += '<button class="btn btn-success" data-action="show-create-equip">+ 创建驱动盘</button></div>';

  // Search bar
  html += '<div class="search-wrap"><input type="text" id="equip-search" placeholder="搜索驱动盘 UID、套装、槽位..." aria-label="搜索驱动盘" value="' + escHtml(state.equipSearch || '') + '" data-action="search-equips"><span class="search-count" id="equip-search-count"></span>' + (state.equipSearch ? '<button class="search-clear" data-action="clear-equip-search" aria-label="清除搜索">×</button>' : '') + '</div>';

  var suits = {};
  for (var i = 0; i < equips.length; i++) {
    var eq = equips[i];
    var suit = eq.suit_name || 'Unknown';
    if (!suits[suit]) suits[suit] = [];
    suits[suit].push(eq);
  }

  var suitKeys = Object.keys(suits);
  for (var si = 0; si < suitKeys.length; si++) {
    var suit = suitKeys[si];
    var items = suits[suit];
    var suitType = 0;
    if (state.templates && state.templates.equips) {
      var tpl = state.templates.equips.find(function(e) { return items[0] && items[0].id === e.id; });
      if (tpl) suitType = tpl.suit_type || 0;
    }
    html += '<div class="equip-suit-section">';
    html += '<div class="equip-suit-title"><span class="suit-chip ' + suitColorClass(suitType) + '">' + escHtml(suit) + '</span> <span class="text-muted">· ' + items.length + ' 件</span></div>';
    html += '<div class="equip-grid">';
    for (var ei = 0; ei < items.length; ei++) {
      var eq = items[ei];
      var mainProp = eq.properties ? eq.properties[0] : null;
      var subCount = eq.sub_properties ? eq.sub_properties.filter(function(p) { return p !== null; }).length : 0;
      var statNames = (state.templates && state.templates.stat_names) || {};
      var mainStatName = mainProp ? (statNames[mainProp.key] || '属性' + mainProp.key) : '—';
      var totalAdd = (eq.sub_properties || []).reduce(function(s, p) { return s + (p && p.add_value ? p.add_value : 0); }, 0);
      var filled = (eq.sub_properties || []).filter(function(p) { return p !== null; }).length;
      var totalExtra = totalAdd - filled;
      var enhanceValid = totalExtra >= 4 && totalExtra <= 5;
      var posNum = eq.id % 10;
      var suitCls = 'suit-' + (suitType % 6);
      html += '<div class="game-card equip-card ' + suitCls + '" tabindex="0" role="button" data-action="select-equip" data-id="' + eq.uid + '">' +
        '<div class="card-header">' +
          '<span><span class="slot-tag">' + posNum + '号位</span><span class="card-title">#' + eq.uid + '</span></span>' +
          '<span class="game-card__level">Lv.' + eq.level + '</span>' +
        '</div>' +
        '<div class="card-meta">' +
          '<span>' + renderStars(eq.star, 5) + '</span>' +
          '<span class="enhance-badge ' + (enhanceValid ? 'enhance-badge--ok' : 'enhance-badge--warn') + '">+' + totalExtra + '</span>' +
        '</div>' +
        '<div class="stat-preview">' +
          '<span class="stat-pill stat-pill--main">' + mainStatName + ' ' + (mainProp ? mainProp.base_value || 0 : 0) + '</span>' +
          renderSubDots(subCount, 4) +
        '</div>' +
      '</div>';
    }
    html += '</div></div>';
  }

  html += '</div>';
  $('#main').innerHTML = html;
}

    h += '<select class="form-select eq-sub-key form-select--flex2" data-idx="' + i + '">';
    h += '<option value="0">— 无 —</option>';

    for (var si = 0; si < subOpts.length; si++) {
      var sopt = subOpts[si];
      var ssel = sp && sp.key === sopt.key ? ' selected' : '';

      h += '<option value="' + sopt.key + '" data-base="' + sopt.base_value + '"' + ssel + '>' + sopt.name + '</option>';

// ═══════════════════════════════════════════════════════
// Save / Delete Equip
// ═══════════════════════════════════════════════════════
async function saveEquip(euid) {
  var mainKey = parseInt((document.getElementById('eq-prop-key') && document.getElementById('eq-prop-key').value) || '0');
  var mainBase = parseInt((document.getElementById('eq-prop-base') && document.getElementById('eq-prop-base').value) || '0');

  var subProps = [];
  var totalExtra = 0;
  for (var i = 0; i < 4; i++) {
    var keyEl = document.querySelector('.eq-sub-key[data-idx="' + i + '"]');
    var addEl = document.querySelector('.eq-sub-add[data-idx="' + i + '"]');
    var baseEl = document.querySelector('.eq-sub-base[data-idx="' + i + '"]');
    var key = parseInt((keyEl && keyEl.value) || '0');
    if (key > 0) {
      var extra = parseInt((addEl && addEl.value) || '0');
      totalExtra += extra;
      subProps.push({
        key: key,
        base_value: parseInt((baseEl && baseEl.value) || '0'),
        add_value: extra + 1
      });
    } else {
      subProps.push(null);
    }
  }

  if (totalExtra < 4 || totalExtra > 5) {
    toast('副词条追加强化总和必须为4-5，当前为' + totalExtra, 'error');
    return;
  }

  // Check duplicate sub stats
  var subKeys = subProps.filter(function(p) { return p !== null; }).map(function(p) { return p.key; });
  if (new Set(subKeys).size !== subKeys.length) {
    toast('副词条种类不能重复', 'error');
    return;
  }

  await safeSave('驱动盘数据', async function() {
    var result = await API.updateEquip(state.uid, euid, {
      level: parseInt(document.getElementById('eq-level').value),
      star: parseInt(document.getElementById('eq-star').value),
      properties: [{ key: mainKey, base_value: mainBase, add_value: 0 }],
      sub_properties: subProps
    });
    if (result && result.ok === false) throw new Error(result.error || '保存失败');
    markCacheDirty();
    state.equipView = 'gallery';
    state.selectedEquipUid = null;
    renderEquips();
  });
}

async function deleteEquip(euid) {
  showConfirm('确定删除驱动盘 #' + euid + '？此操作不可逆。', async function() {
    await safeSave('驱动盘', async function() {
      await API.deleteEquip(state.uid, euid);
      markCacheDirty();
      state.selectedEquipUid = null;
      state.equipView = 'gallery';
      renderEquips();
      loadCounts();
    });
  });
}

// Edit Equip Bind Helpers
// ═══════════════════════════════════════════════════════
function bindEditEnhanceListeners() {
  for (let i = 0; i < 4; i++) {
    var add = document.querySelector('.eq-sub-add[data-idx="' + i + '"]');
    if (add) add.addEventListener('input', updateEditEnhanceSum);
  }
}

function bindEditMainStatChange(slotOpts) {
  var sel = document.getElementById('eq-prop-key');
  if (!sel) return;
  sel.addEventListener('change', function() {
    var base = (sel.selectedOptions[0] && sel.selectedOptions[0].dataset && sel.selectedOptions[0].dataset.base) || '0';
    document.getElementById('eq-prop-base').value = base;
    updateEditEnhanceSum();
  });
}

function bindEditSubStatChanges(subOpts) {
  for (let i = 0; i < 4; i++) {
    var sel = document.querySelector('.eq-sub-key[data-idx="' + i + '"]');
    if (sel) {
      sel.addEventListener('change', function() {

// Create Equip — Final Submit
// ═══════════════════════════════════════════════════════
async function createEquip(equipId) {
  var mainKeyEl = document.getElementById('new-eq-main-key');
  var mainKey = parseInt(mainKeyEl ? mainKeyEl.value || '0' : '0');
  var mainBaseEl = document.getElementById('new-eq-main-base');
  var mainBase = parseInt(mainBaseEl ? mainBaseEl.value || '0' : '0');

  var subProps = [];
  var totalExtra = 0;
  for (var i = 0; i < 4; i++) {
    var keyEl = document.querySelector('.new-eq-sub-key[data-idx="' + i + '"]');
    var addEl = document.querySelector('.new-eq-sub-add[data-idx="' + i + '"]');
    var baseEl = document.querySelector('.new-eq-sub-base[data-idx="' + i + '"]');
    var key = parseInt((keyEl && keyEl.value) || '0');
    if (key > 0) {
      var extra = parseInt((addEl && addEl.value) || '0');
      totalExtra += extra;
      subProps.push({
        key: key,
        base_value: parseInt((baseEl && baseEl.value) || '0'),
        add_value: extra + 1
      });
    } else {
      subProps.push(null);
    }
  }

  if (totalExtra < 4 || totalExtra > 5) {
    toast('副词条追加强化总和必须为4-5，当前为' + totalExtra, 'error');
    return;
  }

  var subKeys = subProps.filter(function(p) { return p !== null; }).map(function(p) { return p.key; });
  if (new Set(subKeys).size !== subKeys.length) {
    toast('副词条种类不能重复', 'error');
    return;
  }

  var body = {
    id: equipId, level: 15, star: 5,
    properties: [{ key: mainKey, base_value: mainBase, add_value: 0 }],
    sub_properties: subProps
  };
  await safeSave('驱动盘', async function() {
    var result = await API.createEquip(state.uid, body);
    closeCreateEquip();
    toast('驱动盘 #' + result.uid + ' 已创建');
    markCacheDirty();
    loadCounts();
    renderEquips();
  });
}

async function onSetupConnect() {
  var path = document.getElementById('setup-state-dir').value.trim();
  // Strip surrounding quotes
  path = path.replace(/^["']+|["']+$/g, '');
  if (!path) return;
  // Pre-validate path format
  if (!/[a-zA-Z]:[\\/]|^\/|^\\\\/.test(path)) {
    var el = document.getElementById('setup-error');
    el.textContent = '路径格式不正确，请输入有效的绝对路径（如 D:\\3.0.1\\state 或 //wsl/...）';
    el.classList.add('visible');
    return;
  }
  var btn = document.querySelector('.setup-btn');
  btn.disabled = true; btn.textContent = '连接中...';
  var result = await API.setStateDir(path);
  btn.disabled = false; btn.textContent = '连接';
  if (result.ok) {
    $('#main').innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>正在启动...</span></div>';
    await new Promise(function(resolve) { setTimeout(resolve, 100); });
    initApp();
  } else {
    var el = document.getElementById('setup-error');
    el.textContent = result.error;
    el.classList.add('visible');
  }
}

document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;

  // Window controls (frameless)
  if (action === 'win-min') { try { pywebview.api.window_minimize(); } catch(e) {} return; }
  if (action === 'win-max') { try { pywebview.api.window_toggle_max(); } catch(e) {} return; }
  if (action === 'win-close') { try { pywebview.api.window_close(); } catch(e) {} return; }

  // Gallery / Navigation actions
  if (action === 'back-to-gallery') { backToGallery(); return; }
  if (action === 'back-to-weapon-gallery') { backToWeaponGallery(); return; }
  if (action === 'back-to-equip-gallery') { backToEquipGallery(); return; }

  // Equip creation flow
  if (action === 'show-create-equip') { showCreateEquip(); return; }
  if (action === 'close-create-equip') { closeCreateEquip(); return; }
  if (action === 'select-create-suit') { selectCreateSuit(el.dataset.suit); return; }
  if (action === 'select-create-slot') {
    selectCreateSlot(parseInt(el.dataset.eqid), parseInt(el.dataset.slot), el.dataset.suit, el.dataset.slotname);
    return;
  }

  // Save actions
  if (action === 'save-hadal-zone') { saveHadalZone(); return; }
  if (action === 'save-player-info') { savePlayerInfo(); return; }
  if (action === 'setup-connect') { onSetupConnect(); return; }
  if (action === 'close-toast') { var t = el.closest('.toast'); if (t) removeToast(t); return; }
  if (action === 'confirm-cancel') { var ov = el.closest('.confirm-overlay'); if (ov) ov.remove(); return; }
  if (action === 'confirm-ok') { var ov = el.closest('.confirm-overlay'); if (ov) { var cb = ov._onConfirm; ov.remove(); if (cb) cb(); } return; }
  if (action === 'change-state-dir') { showConfirm('更改数据目录需要重新设置。确定继续？', function() { renderSetup(); }); return; }
  if (action === 'auto-detect-paths') { autoDetectSettings(); return; }
  if (action === 'open-settings') { state.panel = 'settings'; $$('.nav-item').forEach(function(n) { n.classList.remove('active'); }); state.selectedAvatarId = null; state.selectedWeaponUid = null; state.selectedEquipUid = null; state.equipView = 'gallery'; state.avatarView = 'gallery'; state.weaponView = 'gallery'; _dirty = false; renderPanel().then(function() { var m = $('#main'); m.classList.remove('editor-slide-in'); void m.offsetHeight; m.classList.add('editor-slide-in'); }); return; }
  if (action === 'toggle-theme') { toggleTheme(el); return; }
  if (action === 'set-theme-light') { revealTheme(el, 'light'); return; }
  if (action === 'set-theme-dark') { revealTheme(el, 'dark'); return; }
  if (action === 'toggle-animations') { var ck = el.checked; var v = ck ? 'on' : 'off'; try { localStorage.setItem('yos-animations', v); } catch(e) {} document.documentElement.setAttribute('data-animations', v); var hint = el.parentElement.nextElementSibling; if (hint) hint.textContent = ck ? '已开启' : '已关闭'; return; }
  if (action === 'clear-caches') { state._avatarCache = null; state._weaponCache = null; state._equipCache = null; state._cacheDirty = true; toast('缓存已清除'); return; }
  if (action === 'reset-config') { showConfirm('重置配置将返回初始化页面，继续？', function() { renderSetup(); }); return; }
  if (action === 'go-shortcuts') { state.panel = 'shortcuts'; $$('.nav-item').forEach(function(n) { n.classList.remove('active'); }); renderShortcuts(); return; }
  if (action === 'back-to-suit-select') {
    document.getElementById('create-step1').style.display = 'block';
    document.getElementById('create-step2').style.display = 'none';
    document.getElementById('step-label').textContent = '选择套装';
    return;
  }
  if (action === 'back-to-slot-select') { selectCreateSuit(el.dataset.suit); return; }
  if (action === 'export-player') { exportPlayerData(); return; }
  if (action === 'import-player') { importPlayerData(); return; }

  // Modal overlay close (only if backdrop was clicked, not children)
  if (action === 'modal-close') {
    if (e.target === el) closeCreateEquip();
    return;
  }

  // Setup candidate path click
  if (action === 'candidate-path') {
    var inputEl = document.getElementById('setup-state-dir');
    if (inputEl) inputEl.value = el.dataset.path;
    return;
  }

  // ID-based actions
  var rawId = parseInt(el.dataset.id);
  var id = !isNaN(rawId) ? rawId : null;

  if (action === 'select-avatar') { pressCard(el); selectAvatar(id); return; }
  if (action === 'save-avatar') { saveAvatar(id); return; }
  if (action === 'select-weapon') { pressCard(el); selectWeapon(id); return; }
  if (action === 'save-weapon') { saveWeapon(id); return; }
  if (action === 'select-equip') { pressCard(el); selectEquip(id); return; }
  if (action === 'save-equip') { saveEquip(id); return; }
  if (action === 'delete-equip') { deleteEquip(id); return; }
  if (action === 'create-equip') { createEquip(id); return; }

  // Clamp input on change
  if (action === 'clamp-input') {
    var v = parseInt(el.value) || 0;
    var mn = parseInt(el.dataset.min) || 0;
    var mx = parseInt(el.dataset.max) || 999;
    if (v < mn) el.value = mn;
    if (v > mx) el.value = mx;
    return;
  }

  // Search clear buttons
  if (action === 'clear-avatar-search') { onAvatarSearch(''); document.getElementById('avatar-search').value = ''; return; }
  if (action === 'clear-weapon-search') { onWeaponSearch(''); document.getElementById('weapon-search').value = ''; return; }
  if (action === 'clear-equip-search') { onEquipSearch(''); document.getElementById('equip-search').value = ''; return; }

  // Avatar group toggle
  if (action === 'toggle-avatar-group') {
    state.avatarGroupBy = state.avatarGroupBy === 'camp' ? 'profession' : 'camp';
    renderAvatars();
    return;
  }

  // Unified stepper (Task 4.4)
  if (action === 'step') {
    stepBySelector(
      el.dataset.selector,
      parseInt(el.dataset.delta),
      parseInt(el.dataset.min),
      parseInt(el.dataset.max)
    );
    return;
  }
});

// IME composition guard for search
var _imeComposing = false;
document.addEventListener('compositionstart', function() { _imeComposing = true; });
document.addEventListener('compositionend', function(e) {
  _imeComposing = false;
  // Fire search with final composed value
  var el = e.target.closest('[data-action^="search-"]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'search-avatars') onAvatarSearch(el.value);
  else if (action === 'search-weapons') onWeaponSearch(el.value);
  else if (action === 'search-equips') onEquipSearch(el.value);
});

// Input event delegation for search and clamp
document.addEventListener('input', function(e) {
  if (_imeComposing) return; // Don't search during IME composition
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;
  if (action === 'search-avatars') onAvatarSearch(el.value);
  else if (action === 'search-weapons') onWeaponSearch(el.value);
  else if (action === 'search-equips') onEquipSearch(el.value);
  else if (action === 'clamp-input') {
    var v = parseInt(el.value) || 0;
    var mn = parseInt(el.dataset.min) || 0;
    var mx = parseInt(el.dataset.max) || 999;
    if (v < mn) el.value = mn;
    if (v > mx) el.value = mx;
  }
});

// Keyboard activation for cards
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    var card = e.target.closest('[role="button"]');
    if (card && card.dataset.action) {
      e.preventDefault();
      card.click();
      return;
    }
  }

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  // ESC: close modal or return to gallery
  if (e.key === 'Escape') {
    var confirmEl = document.querySelector('.confirm-overlay');
    if (confirmEl) { confirmEl.remove(); return; }
    var modal = document.querySelector('.modal-overlay');
    if (modal) { closeCreateEquip(); return; }
    if (state.panel === 'avatars' && state.avatarView === 'editor') { backToGallery(); return; }
    if (state.panel === 'weapons' && state.weaponView === 'editor') { backToWeaponGallery(); return; }
    if (state.panel === 'equips' && state.equipView === 'editor') { backToEquipGallery(); return; }
  }

  // Tab: basic focus trap for create modal
  if (e.key === 'Tab') {
    var modal = document.querySelector('.modal-overlay');
    if (!modal) return;
    var focusable = modal.querySelectorAll('button, [tabindex], input, select');
    if (focusable.length === 0) return;
    var first = focusable[0];
    var last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  // 1-6: switch panels
  if (e.key >= '1' && e.key <= '6') {
    var tabs = $$('.nav-item');
    var map = {1: 'avatars', 2: 'weapons', 3: 'equips', 4: 'hadal_zone', 5: 'player_info', 6: 'settings'};
    var target = map[parseInt(e.key)];
    if (target) { state.panel = target; $$('.nav-item').forEach(function(n) { n.classList.remove('active'); }); var items = $$('.nav-item'); for (var i = 0; i < items.length; i++) { if (items[i].dataset.panel === target) { items[i].classList.add('active'); break; } } state.selectedAvatarId = null; state.selectedWeaponUid = null; state.selectedEquipUid = null; state.equipView = 'gallery'; state.avatarView = 'gallery'; state.weaponView = 'gallery'; renderPanel(); }
  }

  // Ctrl+F: focus search
  if (e.ctrlKey && e.key === 'f') {
    e.preventDefault();
    var map = { avatars: 'avatar-search', weapons: 'weapon-search', equips: 'equip-search' };
    var searchId = map[state.panel];
    if (searchId) { var input = document.getElementById(searchId); if (input) { input.focus(); input.select(); } }
    else { var s = document.querySelector('.search-wrap input'); if (s) s.focus(); }
  }

  // Ctrl+S: save
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    var saveBtn = document.querySelector('[data-action="save-avatar"][data-id], [data-action="save-weapon"][data-id], [data-action="save-equip"][data-id]');
    if (saveBtn) saveBtn.click();
  }

  // Ctrl+Z: undo
  if (e.ctrlKey && !e.shiftKey && e.key === 'z') {
    e.preventDefault();
    var snap = popUndo();
    if (snap && snap.restore) snap.restore();
  }
});

// ═══════════════════════════════════════════════════════
// Navigation
// ═══════════════════════════════════════════════════════
$('#nav').addEventListener('click', function(e) {
  var item = e.target.closest('.nav-item');
  if (!item) return;
  $$('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  item.classList.add('active');
  item.setAttribute('aria-selected', 'true');
  $$('.nav-item').forEach(function(n) { if (n !== item) n.setAttribute('aria-selected', 'false'); });
  state.panel = item.dataset.panel;
  state.selectedAvatarId = null;
  state.selectedWeaponUid = null;
  state.selectedEquipUid = null;
  state.equipView = 'gallery';
  state.avatarView = 'gallery';
  state.weaponView = 'gallery';
  _dirty = false;
  renderPanel();
});

async function doSwitchPlayer(newUid) {
  state.uid = newUid;
  state.selectedAvatarId = null;
  state.selectedWeaponUid = null;
  state.selectedEquipUid = null;
  state.equipView = 'gallery';
  state.avatarView = 'gallery';
  state.weaponView = 'gallery';
  state.skillTypes = {};
  state.skillData = {};
  state.avatarSearch = '';
  state.weaponSearch = '';
  state.equipSearch = '';
  state._avatarCache = null;
  state._weaponCache = null;
  state._equipCache = null;
  state._cacheDirty = false;
  if (state.uid) {
    await loadCounts();
    await renderPanel();
  } else {
    $('#main').innerHTML = '<div class="empty-state"><div class="empty-state__icon"></div><p>选择一个玩家开始管理游戏数据</p></div>';
  }
}

$('#player-select').addEventListener('change', function() {
  var rawVal = parseInt(this.value);
  var newUid = !isNaN(rawVal) ? rawVal : null;
  if (_dirty && state.uid && newUid !== state.uid) {
    showConfirm('当前有未保存的更改，切换玩家将丢失。继续？', function() {
      _dirty = false;
      doSwitchPlayer(newUid);
      $('#player-select').value = newUid;
    });
    this.value = state.uid;
    return;
  }
  doSwitchPlayer(newUid);
});

// ═══════════════════════════════════════════════════════
// Render Dispatcher
// ═══════════════════════════════════════════════════════
async function renderPanel() {
  if (!state.uid) return;
  showSkeleton($('#main'));
  try {
    switch(state.panel) {
      case 'avatars': await renderAvatars(); break;
      case 'weapons': await renderWeapons(); break;
      case 'equips': await renderEquips(); break;
      case 'hadal_zone': await renderHadalZone(); break;
      case 'player_info': await renderPlayerInfo(); break;
      case 'settings': await renderSettings(); break;
      case 'shortcuts': renderShortcuts(); break;
    }
    var m = $('#main');
    m.classList.remove('editor-slide-in');
    void m.offsetHeight;
    m.classList.add('editor-slide-in');
  } catch(e) {
    $('#main').innerHTML = '<div class="empty-state"><p class="text-danger">加载失败: ' + escHtml(e.message) + '</p></div>';
  }
}

// ═══════════════════════════════════════════════════════
// Load badge counts for sidebar
// ═══════════════════════════════════════════════════════
function markCacheDirty() {
  state._cacheDirty = true;
}

async function loadCounts() {
  if (!state.uid) return;
  try {
    var results = await Promise.all([
      API.getAvatars(state.uid),
      API.getWeapons(state.uid),
      API.getEquips(state.uid)
    ]);
    // Also seed the cache
    state._avatarCache = results[0].avatars;
    state._weaponCache = results[1].weapons;
    state._equipCache = results[2].equips;
    state._cacheDirty = false;
    $('#avatar-count').textContent = results[0].avatars.filter(function(a) { return a.avatar_id !== 2071 && a.avatar_id !== 2121; }).length;
    $('#weapon-count').textContent = results[1].weapons.filter(function(w) { return w.id < 12000 || w.id > 12999; }).length;
    $('#equip-count').textContent = results[2].equips.length;
  } catch(e) { console.error('loadCounts failed:', e); }
}

// ═══════════════════════════════════════════════════════
// Version display
// ═══════════════════════════════════════════════════════
async function renderVersion() {
  try {
    var resp = await API.getVersion();
    var v = resp.version;
    var elFooter = document.getElementById('app-version');
    if (elFooter) elFooter.textContent = v;
    var elSetup = document.getElementById('setup-version');
    if (elSetup) elSetup.textContent = v;
    var elTitle = document.getElementById('title-version');
    if (elTitle) elTitle.textContent = v;
  } catch(e) {
    // fallback: keep hardcoded version
  }
}

// ═══════════════════════════════════════════════════════
// Init Application
// ═══════════════════════════════════════════════════════
async function initApp() {
  try {
    var cfg = await API.getConfig();
    if (cfg && cfg.configured && cfg.config_exists) {
      var data = await API.getPlayerList();
      var sel = $('#player-select');
      sel.innerHTML = '<option value="">-- 选择玩家 --</option>';
      for (var i = 0; i < data.players.length; i++) {
        var pid = data.players[i];
        sel.innerHTML += '<option value="' + pid + '">玩家 UID: ' + escHtml(String(pid)) + '</option>';
      }
      if (data.players.length > 0) {
        sel.value = data.players[0];
        state.uid = data.players[0];
      }
      state.templates = await API.getTemplates();
      buildTemplateMaps();
      if (state.uid) { await loadCounts(); await renderPanel(); }
      renderVersion();
      return;
    }
  } catch(e) { console.error('initApp error:', e); }
  // Not configured — enhance existing setup form with auto-detect
  setupEnhance();
  renderVersion();
}

// ═══════════════════════════════════════════════════════
// Theme toggle — overlay opacity fade
// ═══════════════════════════════════════════════════════
function revealTheme(btnEl, targetTheme) {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  if (current === targetTheme) return;

  // Capture old theme's background color
  var oldBg = getComputedStyle(document.body).backgroundColor;
  // Switch theme instantly
  html.setAttribute('data-theme', targetTheme);
  try { localStorage.setItem('yos-theme', targetTheme); } catch (e) {}
  // Overlay with old color fades out, revealing new theme underneath
  var overlay = document.createElement('div');
  overlay.className = 'theme-fade-overlay';
  overlay.style.background = oldBg;
  document.body.appendChild(overlay);
  overlay.addEventListener('animationend', function() {
    overlay.remove();
  });
  if (state.panel === 'settings') renderSettings();
}

function toggleTheme(btnEl) {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  revealTheme(btnEl, next);
}

function pressCard(el) {
  el.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1)';
  el.style.transform = 'scale(0.92)';
  setTimeout(function () { el.style.transform = 'scale(1)'; }, 120);
}

function showSkeleton(container) {
  container.innerHTML = '<div class="skeleton-wrap"><div class="skeleton skeleton--title"></div><div class="skeleton-grid">' +
    Array(6).fill('<div class="skeleton skeleton--card"></div>').join('') + '</div></div>';
}

function applyStaggeredAnimation(selector) {
  var cards = document.querySelectorAll(selector);
  cards.forEach(function(card, i) {
    card.style.opacity = '0';
    card.style.transform = 'translateY(16px)';
    card.style.transition = 'opacity 0.3s cubic-bezier(0.34,1.56,0.64,1), transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transitionDelay = (i % 6) * 35 + 'ms';
    requestAnimationFrame(function() {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    });
  });
}

async function autoDetectSettings() {
  try {
    var r = await API.autoDetectPaths();
    if (r.candidates && r.candidates.length > 0) {
      var el = document.getElementById('set-state-dir');
      if (el) el.value = r.candidates[0];
      toast('检测到 ' + r.candidates.length + ' 个路径');
    } else { toast('未检测到可用路径', 'warning'); }
  } catch(e) { toast('检测失败', 'error'); }
}

async function setupEnhance() {
  try {
    var v = await API.getVersion();
    var el = document.getElementById('setup-version');
    if (el) el.textContent = v.version;
  } catch(e) {}
  try {
    var r = await API.autoDetectPaths();
    if (r.candidates && r.candidates.length > 0) {
      var candHtml = '';
      r.candidates.forEach(function(p) {
        candHtml += '<div class=\"candidate-path\" data-action=\"candidate-path\" data-path=\"' + escHtml(p) + '\">' + escHtml(p) + '</div>';
      });
      var el = document.getElementById('setup-candidates');
      if (el) el.innerHTML = '<p class=\"text-sm text-muted mb-1 mt-2\">检测到的路径（点击填入）：</p>' + candHtml;
      var inp = document.getElementById('setup-state-dir');
      if (inp) inp.value = r.candidates[0];
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
// Title bar drag (JS fallback for frameless window)
// ═══════════════════════════════════════════════════════
(function() {
  var titleBar = document.querySelector('.title-bar');
  if (!titleBar) return;
  var dragging = false, startX = 0, startY = 0;
  titleBar.addEventListener('mousedown', function(e) {
    if (e.target.closest('.tb-btn') || e.target.closest('[data-action]')) return;
    dragging = true;
    startX = e.screenX;
    startY = e.screenY;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var dx = e.screenX - startX;
    var dy = e.screenY - startY;
    if (dx === 0 && dy === 0) return;
    startX = e.screenX;
    startY = e.screenY;
    try { window.pywebview.api.window_move(dx, dy); } catch(ex) {}
  });
  document.addEventListener('mouseup', function() { dragging = false; });
})();

// ═══════════════════════════════════════════════════════
// Undo Stack
// ═══════════════════════════════════════════════════════
var _undoStack = [];
var MAX_UNDO = 20;
function pushUndo(snapshot) {
  _undoStack.push(snapshot);
  if (_undoStack.length > MAX_UNDO) _undoStack.shift();
}
function popUndo() { return _undoStack.pop(); }

// ═══════════════════════════════════════════════════════
// Unsaved changes warning
// ═══════════════════════════════════════════════════════
var _dirty = false;
function markDirty() { _dirty = true; updateDirtyNav(); }
function markClean() { _dirty = false; updateDirtyNav(); }
function updateDirtyNav() {
  $$('.nav-item').forEach(function(n) {
    if (n.dataset.panel === state.panel) n.classList.toggle('dirty', _dirty);
  });
}
window.addEventListener('beforeunload', function(e) {
  if (_dirty) { e.preventDefault(); e.returnValue = ''; }
});

// Mark dirty on input changes in editor views
document.addEventListener('input', function(e) {
  if (e.target.closest('.panel-box__body') || e.target.closest('.weapon-editor') || e.target.closest('.avatar-editor') || e.target.closest('.equip-editor')) {
    _dirty = true;
  }
});

// ═══════════════════════════════════════════════════════
// Bootstrap — poll bridge, auto-detect first, then init
// ═══════════════════════════════════════════════════════
(function bootstrap() {
  function ready() { return window.pywebview && window.pywebview.api; }

  // Auto-detect runs FIRST, independently, as soon as bridge is ready
  function tryAutoDetect() {
    if (!ready()) return false;
    if (!document.getElementById('setup-state-dir')) return false;
    setupEnhance();
    return true;
  }

  // Aggressive auto-detect: every 200ms
  var _ad = setInterval(function() {
    if (tryAutoDetect() || ++_adTries > 150) clearInterval(_ad);
  }, 200);
  var _adTries = 0;

  // Init runs after auto-detect attempt
  function tryInit() {
    if (!ready()) return false;
    clearInterval(_ad);
    tryAutoDetect();
    initApp();
    return true;
  }
  if (tryInit()) return;
  window.addEventListener('pywebviewready', tryInit);
  var _n = 0;
  var _t = setInterval(function() {
    if (tryInit() || ++_n >= 50) clearInterval(_t);
  }, 200);
})();
