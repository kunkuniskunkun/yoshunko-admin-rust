<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoshunko Admin</title>
<link rel="stylesheet" href="css/app.css">
<script src="js/tauri-compat.js"></script>
</head>
<body>
<div class="title-bar">
  <span class="title-bar__text">Yoshunko Admin <span id="title-version">---</span></span>
  <div class="title-bar__ctrls">
    <button class="tb-btn" data-action="win-min" title="最小化" aria-label="最小化">─</button>
    <button class="tb-btn" data-action="win-max" title="最大化" aria-label="最大化">□</button>
    <button class="tb-btn tb-btn--close" data-action="win-close" title="关闭" aria-label="关闭">✕</button>
  </div>
</div>
<a href="#main" class="skip-link">跳转到主内容</a>
<div class="app-layout">
<div id="sidebar" role="navigation" aria-label="功能导航">
  <div class="sidebar-brand">
    <img class="logo" src="icon.png" alt="Y" width="85" height="85">
    <div>
      <h1>Yoshunko Admin</h1>
      <span>Game Data Manager</span>
    </div>
  </div>
  <select id="player-select" aria-label="选择玩家">
    <option value="">⏳ 加载中...</option>
  </select>
  <div class="nav-section" id="nav" role="tablist" aria-label="功能面板">
    <div class="nav-item active" role="tab" aria-selected="true" data-panel="avatars">
      <span class="nav-icon nav-icon--avatar"></span> 角色管理
      <span class="nav-badge" id="avatar-count">-</span>
    </div>
    <div class="nav-item" role="tab" aria-selected="false" data-panel="weapons">
      <span class="nav-icon nav-icon--weapon"></span> 音擎仓库
      <span class="nav-badge" id="weapon-count">-</span>
    </div>
    <div class="nav-item" role="tab" aria-selected="false" data-panel="equips">
      <span class="nav-icon nav-icon--equip"></span> 驱动盘仓库
      <span class="nav-badge" id="equip-count">-</span>
    </div>
    <div class="nav-item" role="tab" aria-selected="false" data-panel="hadal_zone">
      <span class="nav-icon nav-icon--hadal"></span> 式舆防卫战
    </div>
    <div class="nav-item" role="tab" aria-selected="false" data-panel="player_info">
      <span class="nav-icon nav-icon--player"></span> 玩家信息
    </div>
    <div class="nav-item" role="tab" aria-selected="false" data-panel="quick_launch">
      <span class="nav-icon nav-icon--launch"></span> 快速启动
    </div>
  </div>
  <div class="sidebar-footer">
    <button class="sidebar-settings-btn" data-action="open-settings" title="系统设置" aria-label="系统设置"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
    <button class="theme-toggle theme-toggle--sidebar" data-action="toggle-theme" title="切换主题" aria-label="切换主题"><svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
  </div>
</div>

<div id="main" role="main" aria-label="主内容区">
  <div class="setup-page"><div class="setup-card">
    <h1>Yoshunko Admin</h1>
    <p class="setup-version" id="setup-version">---</p>
    <p class="setup-desc">首次使用，请配置 yoshunko state 目录路径</p>
    <div class="setup-input-wrap">
      <label for="setup-state-dir">State 目录</label>
      <div class="setup-input-row">
        <input type="text" id="setup-state-dir" placeholder="例如: \\wsl.localhost\Ubuntu\root\yoshunko\state" />
        <button class="setup-paste-btn" data-action="paste-to-input" type="button" title="从剪贴板粘贴">粘贴</button>
      </div>
      <div id="setup-candidates"></div>
    </div>
    <div id="setup-error" class="setup-error"></div>
    <button class="setup-btn" data-action="setup-connect" type="button">连接</button>
  </div></div>
</div>
</div>

<div id="toast-container" aria-live="polite" aria-atomic="true"></div>


<script>
// Auto-detect immediately after DOM ready, before big JS bundle
(function ad() {
  if (!window.pywebview || !window.pywebview.api) { setTimeout(ad, 200); return; }
  pywebview.api.auto_detect_paths().then(function(r) {
    if (r.candidates && r.candidates.length > 0) {
      var el = document.getElementById('setup-candidates');
      if (el) { el.innerHTML = '<p class=\"text-sm text-muted\" class=\"mb-1 mt-2\">检测到的路径（点击填入）：</p>' + r.candidates.map(function(p) { return '<div class=\"candidate-path\" data-action=\"candidate-path\" data-path=\"' + p.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '\">' + p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'; }).join(''); }
      var inp = document.getElementById('setup-state-dir');
      if (inp) inp.value = r.candidates[0];
    }
    pywebview.api.get_version().then(function(v) {
      var el = document.getElementById('setup-version');
      if (el) el.textContent = v.version;
    });
  }).catch(function(){});
})();
</script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/panels/avatars.js"></script>
<script src="js/panels/weapons.js"></script>
<script src="js/panels/equips.js"></script>
<script src="js/panels/hadal.js"></script>
<script src="js/panels/player.js"></script>
<script src="js/panels/quicklaunch.js"></script>
<script src="js/panels/settings.js"></script>
<script src="js/panels/shortcuts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
